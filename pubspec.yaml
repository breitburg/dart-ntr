name: ntr
description: >-
  Pure-Dart implementation of the NTR CFW protocol for the Nintendo 3DS:
  TCP control channel, UDP screen streaming (Remote Play), and the
  debugger / WriteMem surface. Transport-only — bring your own UI.
version: 0.1.0

environment:
  sdk: ^3.12.0

dependencies:
  logging: ^1.3.0

dev_dependencies:
  lints: ^6.0.0
  test: ^1.25.6
